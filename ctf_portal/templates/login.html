<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntraCore Portal - 로그인</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/intracore.css') }}">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>IntraCore</h1>
                <p>Internal Operations Portal</p>
            </div>
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="flash-messages">
                {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}
            <form method="post" class="login-form">
                <div class="form-group">
                    <label for="username">사용자명</label>
                    <input type="text" id="username" name="username" required autofocus
                           placeholder="사용자명을 입력하세요">
                </div>
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" required
                           placeholder="비밀번호를 입력하세요">
                </div>
                <button type="submit" class="btn btn-primary btn-full">로그인</button>
            </form>
            <div class="login-footer">
                <p><a href="{{ url_for('auth.register') }}">계정이 없으신가요? 회원가입</a></p>
                <p>&copy; 2026 IntraCore Systems, Inc.</p>
            </div>
        </div>
    </div>
</body>
</html>
